<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>报文转 Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 520px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f5f5f5;
    }
    .header {
      background: #2c3e50;
      color: white;
      padding: 12px 16px;
      text-align: center;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .content {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .field label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .field input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }
    .field input[type="text"]:focus {
      outline: none;
      border-color: #3498db;
    }
    .field textarea {
      width: 100%;
      min-height: 280px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
      line-height: 1.5;
      resize: vertical;
    }
    .field textarea:focus {
      outline: none;
      border-color: #3498db;
    }
    .field textarea::placeholder {
      color: #bbb;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 0 16px 12px;
    }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3498db;
      color: white;
    }
    .btn-primary:hover { background: #2980b9; }
    .btn-secondary {
      background: #e0e0e0;
      color: #555;
    }
    .btn-secondary:hover { background: #d0d0d0; }
    .toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #e74c3c; }
    .toast.success { background: #27ae60; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📝 报文转 Text</h1>
  </div>

  <div class="content">
    <div class="field">
      <label>文件名（不含扩展名）</label>
      <input type="text" id="filename" placeholder="例如：api_request_001">
    </div>

    <div class="field">
      <label>报文内容</label>
      <textarea id="content" placeholder="在此粘贴报文内容...

支持：
- HTTP 请求/响应报文
- 任意文本内容
- 多行内容"></textarea>
    </div>
  </div>

  <div class="actions">
    <button id="btnClear" class="btn btn-secondary">清空</button>
    <button id="btnExport" class="btn btn-primary">导出 Text</button>
  </div>

  <div id="toast" class="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
